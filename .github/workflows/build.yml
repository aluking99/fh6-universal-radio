name: Build DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        git clone https://github.com/nlohmann/json.git third_party/nlohmann
        git clone https://github.com/ToruNiina/toml11.git third_party/toml11
        git clone https://github.com/mackron/miniaudio.git third_party/miniaudio

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: version-dll
        path: build/**/*.dll
